spring.application.name=execution-service

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/flowforge_execution}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8083

jwt.secret=${JWT_SECRET:c2VjcmV0LWtleS1mb3ItZmxvd2ZvcmdlLWFwcC0tMzI=}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=execution-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

workflow.service.url=${WORKFLOW_SERVICE_URL:http://localhost:8082}
internal.service.key=${INTERNAL_SERVICE_KEY:flowforge_internal_dev_key}
