spring.application.name=workflow-service

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/flowforge_workflow}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8082

jwt.secret=${JWT_SECRET:c2VjcmV0LWtleS1mb3ItZmxvd2ZvcmdlLWFwcC0tMzI=}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

org.jobrunr.background-job-server.enabled=${ORG_JOBRUNR_BACKGROUND_JOB_SERVER_ENABLED:true}
org.jobrunr.background-job-server.worker-count=2
org.jobrunr.dashboard.enabled=${ORG_JOBRUNR_DASHBOARD_ENABLED:false}

internal.service.key=${INTERNAL_SERVICE_KEY:flowforge_internal_dev_key}
