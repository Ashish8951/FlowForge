services:

  # ── INFRASTRUCTURE ──

  postgres:
    image: postgres:16-alpine
    container_name: flowforge-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flowforge-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: flowforge-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── SERVICES ──

  auth-service:
    build: ./auth-service
    container_name: flowforge-auth
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/flowforge_auth
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-c2VjcmV0LWtleS1mb3ItZmxvd2ZvcmdlLWFwcC0tMzI=}
      SERVER_PORT: 8081
    depends_on:
      postgres:
        condition: service_healthy

  workflow-service:
    build: ./workflow-service
    container_name: flowforge-workflow
    ports:
      - "8082:8082"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/flowforge_workflow
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-c2VjcmV0LWtleS1mb3ItZmxvd2ZvcmdlLWFwcC0tMzI=}
      SERVER_PORT: 8082
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-flowforge_internal_dev_key}
      ORG_JOBRUNR_BACKGROUND_JOB_SERVER_ENABLED: "true"
      ORG_JOBRUNR_DASHBOARD_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  execution-service:
    build: ./execution-service
    container_name: flowforge-execution
    ports:
      - "8083:8083"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/flowforge_execution
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-c2VjcmV0LWtleS1mb3ItZmxvd2ZvcmdlLWFwcC0tMzI=}
      WORKFLOW_SERVICE_URL: http://workflow-service:8082
      SERVER_PORT: 8083
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-flowforge_internal_dev_key}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
